<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Your Vexis Account</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #060609;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #E8E8ED;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      width: 100%;
      table-layout: fixed;
      background-color: #060609;
      padding-top: 40px;
      padding-bottom: 40px;
    }
    .main {
      background-color: #0a0a10;
      margin: 0 auto;
      width: 100%;
      max-width: 600px;
      border-radius: 16px;
      border: 1px solid #1a1a26;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .header {
      padding: 40px 32px 20px;
      text-align: center;
    }
    .logo-container {
      margin: 0 auto 24px;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #4F8CFF, #2DD4BF);
      border-radius: 12px;
      text-align: center;
      line-height: 48px;
      display: inline-block;
    }
    .logo-svg {
      vertical-align: middle;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .content {
      padding: 20px 40px 40px;
      text-align: center;
    }
    p {
      margin: 0 0 24px;
      font-size: 15px;
      line-height: 1.6;
      color: #9898A8;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background-color: #4F8CFF;
      color: #ffffff !important;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(79, 140, 255, 0.25);
    }
    .footer {
      padding: 24px;
      text-align: center;
      border-top: 1px solid #1a1a26;
      background-color: #060609;
    }
    .footer p {
      margin: 0;
      font-size: 12px;
      color: #55556A;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <table class="main" width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td class="header">
          <div class="logo-container">
            <svg class="logo-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </div>
          <h1>System Authorization Required</h1>
        </td>
      </tr>
      <tr>
        <td class="content">
          <p>You have requested access to the Vexis AI Command Center. Please verify your identity to deploy your agent fleet and securely access your workspace.</p>
          <a href="{{ .ConfirmationURL }}" class="btn">Verify Identity &amp; Authenticate</a>
        </td>
      </tr>
      <tr>
        <td class="footer">
          <p>Powered by NullClaw Core &middot; Vexis Agency</p>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
