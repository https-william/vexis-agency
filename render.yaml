services:
  - type: web
    name: vexis-backend
    env: python
    plan: free
    buildCommand: "cd gateway && pip install -r requirements.txt"
    startCommand: "cd gateway && uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEFAULT_MODEL
        value: llama-3.3-70b-versatile
      - key: FALLBACK_MODEL
        value: llama-3.1-8b-instant
